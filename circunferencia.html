<!DOCTYPE html>
<html>

<head>

    <meta charset="utf-8">
    <title>Circunferência</title>

    <link rel="stylesheet" href="css/estilo.css">

</head>


<body>

<h1>Circunferência</h1>


<h2>Definição</h2>

<p>
A <strong>circunferência</strong> é o lugar geométrico dos pontos de um plano
que são equidistantes de um ponto fixo, chamado <strong>centro</strong>.
</p>


<p>
Qualquer segmento que liga o centro a um ponto da circunferência
é chamado <strong>raio</strong>.
</p>


<div class="painel">


    <div class="controles">

        <label>
            Centro:
            (
            <input type="number" id="x" value="300">
            ,
            <input type="number" id="y" value="200">
            )
        </label>


        <label>
            Raio:
            <input type="number" id="raio" value="50">
        </label>


        <button>
            Criar
        </button>

    </div>



    <svg width="600" height="400" id="quadro" class="lousa">
    </svg>


</div>



<script src="js/ponto.js"></script>

<script src="js/circunferencia.js"></script>

<script src="js/lousa.js"></script>



<script>

let lousa_svg = document.getElementById("quadro");

let lousa_obj = new Lousa(lousa_svg);


let botao = document.querySelector("button");


botao.onclick = function() {

    let x = Number(document.getElementById("x").value);

    let y = Number(document.getElementById("y").value);

    let raio = Number(document.getElementById("raio").value);


    let O = new Ponto(x,y);

    let C = new Circunferencia(O,raio);


    lousa_obj.adicionar(C);

};


</script>



</body>

</html>
