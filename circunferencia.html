<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Circunferência</title>
</head>

<body>

<h1>Circunferência</h1>

<h2>Definição</h2>

<p>
A <strong>circunferência</strong> é o lugar geométrico dos pontos de um plano
que são equidistantes de um ponto fixo, chamado <strong>centro</strong> da circunferência.
</p>

<p>
Qualquer segmento que liga o centro a um ponto da circunferência
é chamado <strong>raio</strong>.
</p>


<h2>Construção interativa</h2>

<svg width="400" height="400">

    <!-- circunferência -->
    <circle
        cx="200"
        cy="200"
        r="100"
        stroke="black"
        stroke-width="2"
        fill="none"
    />

    <!-- centro -->
    <circle
        cx="200"
        cy="200"
        r="5"
        fill="black"
    />

    <!-- raio -->
    <line
        x1="200"
        y1="200"
        x2="300"
        y2="200"
        stroke="red"
        stroke-width="3"
    />

</svg>


</body>

</html>
