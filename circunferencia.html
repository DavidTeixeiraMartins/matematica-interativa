<h1>Circunferência</h1>

<h2>Definição</h2>

<p>
A <strong>circunferência</strong> é o lugar geométrico dos pontos de um plano
que são equidistantes de um ponto fixo, chamado <strong>centro</strong> da circunferência.
</p>

<p>
Qualquer segmento que liga o centro a um ponto da circunferência
é chamado <strong>raio</strong>.
</p>

<svg width="500" height="500" id="lousa">
</svg>


<script>

class Ponto {

    constructor(x, y) {
        this.x = x;
        this.y = y;
    }

}


class Circunferencia {

    constructor(centro, raio) {
        this.centro = centro;
        this.raio = raio;
    }

}

desenhar(svg) {

        let circulo = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "circle"
        );

        circulo.setAttribute("cx", 250);
        circulo.setAttribute("cy", 250);
        circulo.setAttribute("r", this.raio);

        circulo.setAttribute("fill", "none");
        circulo.setAttribute("stroke", "black");

        svg.appendChild(circulo);
    }

}

let svg = document.getElementById("lousa");

C.desenhar(svg);


let O = new Ponto(0,0);

let C = new Circunferencia(O,50);

console.log(C);

</script>
