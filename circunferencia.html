<!DOCTYPE html>
<html>

<head>

    <meta charset="utf-8">
    <title>Circunferência</title>

    <link rel="stylesheet" href="css/estilo.css">

</head>


<body>

<h1>Circunferência</h1>


<h2>Definição</h2>

<p>
A <strong>circunferência</strong> é o lugar geométrico dos pontos de um plano
que são equidistantes de um ponto fixo, chamado <strong>centro</strong>.
</p>


<p>
Qualquer segmento que liga o centro a um ponto da circunferência
é chamado <strong>raio</strong>.
</p>


<div class="painel">


    <div class="controles">

        <label>
            Centro x:
            <input type="number" id="x" value="100">
        </label>


        <label>
            Centro y:
            <input type="number" id="y" value="80">
        </label>


        <label>
            Raio:
            <input type="number" id="raio" value="50">
        </label>


        <button>
            Criar
        </button>

    </div>



    <svg width="500" height="500" id="lousa">
    </svg>


</div>



<script src="js/ponto.js"></script>

<script src="js/circunferencia.js"></script>

<script src="js/lousa.js"></script>



<script>


let svg = document.getElementById("lousa");


let lousa = new Lousa(svg);



let O = new Ponto(100,80);


let C = new Circunferencia(O,50);



lousa.adicionar(C);



</script>



</body>

</html>
